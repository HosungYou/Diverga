# Balanced Transformation Mode
# Recommended default mode for most academic writing
# Best for: General academic writing, conference papers, reports

version: "2.0.0"
mode: "balanced"
description: |
  The recommended mode for most academic writing. Addresses both high and
  medium-risk AI patterns while maintaining scholarly tone and preserving
  all critical elements. Aims for natural reading flow without sacrificing
  academic precision.

# Target HIGH and MEDIUM-RISK patterns
target_patterns:
  include:
    # High-risk (all)
    - C1   # Significance Inflation
    - C4   # Promotional Language
    - C5   # Vague Attributions
    - L1   # AI Vocabulary (both tiers)
    - S5   # Emoji Usage
    - M1   # Chatbot Artifacts
    - M2   # Knowledge Disclaimers
    - A3   # Discussion Inflation
    - A4   # Citation Hedging

    # Medium-risk
    - C2   # Notability Claims
    - C3   # Superficial -ing
    - L2   # Copula Avoidance
    - L3   # Negative Parallelism
    - L5   # Elegant Variation
    - S1   # Em Dash Overuse
    - S3   # Inline-Header Lists
    - M3   # Sycophantic Tone
    - H2   # Excessive Hedging
    - H3   # Generic Conclusions

  exclude:
    - C6   # Formulaic Sections (some structure OK)
    - L4   # Rule of Three (often natural)
    - L6   # False Ranges (context-dependent)
    - S2   # Boldface (style-dependent)
    - S4   # Title Case (check journal)
    - S6   # Quote style (normalize only)
    - H1   # Verbose phrases (unless excessive)
    - A1   # Abstract template (expected)
    - A2   # Methods boilerplate (acceptable)
    - A5   # Contribution enumeration
    - A6   # Limitation disclaimers

# Transformation intensity
intensity:
  vocabulary_changes: "moderate"    # Both tier1 and tier2
  phrase_restructuring: "selective" # When improves flow
  sentence_changes: "occasional"    # For better variety
  paragraph_changes: "rare"         # Only if clearly artificial

# Specific transformations for balanced mode
transformations:

  # === HIGH-RISK (from conservative) ===

  C1:
    approach: "downgrade_claims"
    transform_all: true
    examples:
      - ["pivotal", "important"]
      - ["groundbreaking", "novel"]
      - ["revolutionizes", "advances"]
      - ["transformative", "influential"]
      - ["seminal", "foundational"]
      - ["landmark", "notable"]

  C4:
    approach: "neutralize_all"
    examples:
      - ["cutting-edge", "current"]
      - ["state-of-the-art", "established"]
      - ["exciting", "interesting"]
      - ["remarkable", "notable"]
      - ["stunning", "clear"]
      - ["unprecedented", "unusual"]

  C5:
    approach: "require_or_rephrase"
    examples:
      - before: "Studies have shown"
        after: "[Author, year] found"
        action: "Add citation or note [citation needed]"
      - before: "Research demonstrates"
        after: "[Specific study] demonstrated"
      - before: "Experts argue"
        after: "[Named expert, year] argues"

  L1:
    approach: "substitute_both_tiers"
    tier1_map:  # Always transform
      "delve": "examine"
      "delve into": "examine"
      "tapestry": "range"
      "intricacies": "details"
      "multifaceted": "complex"
      "nuanced": "detailed"
      "myriad": "many"
      "plethora": "many"
      "paramount": "essential"
      "testament to": "evidence of"
      "embark on": "begin"
      "realm": "area"
      "indelible": "lasting"

    tier2_map:  # Transform in balanced mode
      "landscape": "context"
      "underscore": "emphasize"
      "pivotal": "key"
      "leverage": "use"
      "utilize": "use"
      "facilitate": "enable"
      "foster": "encourage"
      "synergy": "collaboration"
      "holistic": "comprehensive"
      "robust": "strong"  # unless statistics
      "furthermore": "additionally"
      "subsequently": "then"
      "nonetheless": "however"

  # === MEDIUM-RISK ===

  C2:
    approach: "add_specificity"
    examples:
      - before: "widely cited"
        after: "cited [N] times"
      - before: "well-established theory"
        after: "[Author]'s [year] theory"
      - before: "leading researchers"
        after: "[Named researchers]"

  C3:
    approach: "convert_to_direct"
    examples:
      - before: "highlighting the importance of"
        after: "[X] is important because"
      - before: "underscoring the need for"
        after: "[Y] is needed"
      - before: "demonstrating the value of"
        after: "[Z] shows value by"
      - before: "contributing to the understanding"
        after: "helps explain"

  L2:
    approach: "simplify_verbs"
    examples:
      - ["serves as", "is"]
      - ["stands as", "is"]
      - ["functions as", "is"]
      - ["acts as", "is"]
      - ["operates as", "works as"]
      - ["exists as", "is"]
      - ["boasts", "has"]
      - ["possesses", "has"]
      - ["encompasses", "includes"]
      - ["embodies", "shows"]
      - ["epitomizes", "shows"]

  L3:
    approach: "vary_or_simplify"
    threshold: "1 per document"
    examples:
      - before: "not only X but also Y"
        options:
          - "both X and Y"
          - "X as well as Y"
          - "X, and also Y"
    note: "Allow first instance; transform subsequent"

  L5:
    approach: "use_consistent_terms"
    examples:
      - before: "study... research... investigation"
        after: "study... study... study"
      - before: "participants... subjects... respondents"
        after: "participants... participants... participants"
    note: "Pick most appropriate term; use consistently"

  S1:
    approach: "substitute_punctuation"
    threshold: "2 per document"
    alternatives:
      parenthetical: "Use ( ) for asides"
      elaboration: "Use : for lists"
      interruption: "Use , for light pause"
      separate: "Create new sentence"

  S3:
    approach: "convert_to_prose"
    example:
      before: |
        **Finding 1**: Students improved scores.
        **Finding 2**: Teachers reported satisfaction.
      after: |
        Students improved their scores, and teachers reported satisfaction with the program.

  M3:
    approach: "neutralize_or_remove"
    examples:
      - before: "That's an excellent point"
        after: "This is a valid point" or (remove)
      - before: "Great observation"
        after: (remove or) "This observation"

  H2:
    approach: "single_hedge"
    examples:
      - ["could potentially", "may"]
      - ["may possibly", "may"]
      - ["might potentially", "might"]
      - ["seems to suggest", "suggests"]
      - ["appears to indicate", "indicates"]
      - ["could be considered to", "may be"]

  H3:
    approach: "add_specificity"
    examples:
      - before: "Future research is needed"
        after: "Future research should examine [specific question]"
      - before: "More studies are warranted"
        after: "Studies examining [specific aspect] would clarify..."
      - before: "The implications are far-reaching"
        after: "These findings suggest [specific implication]"

  A3:
    approach: "match_evidence"
    examples:
      - ["revolutionizes understanding", "advances understanding"]
      - ["fundamentally changes", "contributes to"]
      - ["unprecedented implications", "notable implications"]

  A4:
    approach: "require_citation"
    examples:
      - before: "Previous studies have shown"
        after: "[Citation] found"
    note: "Mark [citation needed] if author must add"

  # === STRUCTURAL PATTERNS (v2.0) ===

  S7:
    approach: "dissolve_enumeration"
    description: "Convert First/Second/Third enumerations into flowing prose"
    transform_targets:
      - "First,... Second,... Third,..."
      - "Three main findings:"
      - "Four key contributions:"
      - Ordinal markers embedded in prose paragraphs
    preserve:
      - "Enumerated steps in Methods (procedural sequences)"
      - "Numbered items in true lists (tables, appendices)"
    example:
      before: |
        First, education significantly predicted AI concern.
        Second, partisan identity showed the strongest association.
        Third, age interacted with awareness to shape attitudes.
      after: |
        Education emerged as a reliable predictor of AI concern, but partisan
        identity dwarfed its effect -- a finding that persisted even after
        adjusting for demographic covariates. Age told a more complicated story,
        one that depended heavily on whether respondents had heard of ChatGPT
        before the survey.

  S8:
    approach: "vary_paragraph_openers"
    description: "Ensure no more than 2 consecutive paragraphs start with the same opener pattern"
    detection:
      - ">2 consecutive paragraphs starting with 'The [X]...'"
      - ">2 consecutive paragraphs starting with 'This [X]...'"
      - ">2 consecutive paragraphs starting with identical syntactic structure"
    strategies:
      - "Start with a question"
      - "Start with a short declarative"
      - "Start with a dependent clause"
      - "Start with a concrete example or number"
      - "Start with a contrast or concession"
    example:
      before: |
        The results for education... / The partisan gap... /
        The interaction between age and awareness... /
        The Blinder-Oaxaca decomposition...
      after: |
        Education's role proved more nuanced than a simple linear gradient... /
        What explains the partisan gap? Not demographics alone... /
        Age and awareness interacted in ways that complicate... /
        Decomposing the partisan gap revealed something unexpected...

  S9:
    approach: "break_discussion_formula"
    description: "Open Discussion with hooks or questions instead of formulaic restatement"
    detection:
      - "Discussion opening with 'The present study examined...'"
      - "Discussion opening with 'This study investigated...'"
      - "Discussion opening with 'The purpose of this study was...'"
      - "Formulaic sequence: restate → compare → implications → limitations → future"
    strategies:
      - "Open with a compelling question"
      - "Open with the most surprising finding"
      - "Open with a real-world scenario"
      - "Open with a tension or paradox from the results"
    example:
      before: "The present study examined... Our findings are consistent with..."
      after: |
        Why do Democrats and Republicans -- who agree on almost nothing --
        both worry about AI at nearly identical rates?

  S10:
    approach: "narrative_hypothesis"
    description: "Convert hypothesis checklists to thematic narrative with effect sizes"
    detection:
      - "H1 was supported. H2 was partially supported."
      - "Hypothesis 1 was confirmed. Hypothesis 2..."
      - "Sequential listing of hypothesis outcomes"
    strategies:
      - "Group related hypotheses thematically"
      - "Anchor narrative with concrete effect sizes"
      - "Use surprising non-findings to drive discussion"
      - "Weave hypothesis outcomes into argument flow"
    example:
      before: "H1 was supported (p < .001). H2 was partially supported. H3 was not supported."
      after: |
        The partisan divide we predicted materialized clearly -- Republicans
        were 14 percentage points more likely to express concern (AME = 0.14,
        p < .001). But the education gradient surprised us: rather than a
        simple linear relationship, the effect flattened above a bachelor's degree.

# Burstiness Enhancement (v2.0)
burstiness_enhancement:
  description: "Deliberately vary sentence length to increase CV"
  target_cv: ">0.45"
  strategies:
    - "Insert 2-5 word declarative sentences at impact points"
    - "Allow 1-2 complex sentences per section to reach 40-60 words"
    - "Break medium-length sentences (15-25 words) into shorter or longer forms"
    - "Use sentence fragments strategically for emphasis"
    - "Vary paragraph length: alternate 2-sentence and 6-sentence paragraphs"

# Preservation rules
preservation:
  always_preserve:
    - citations: "All"
    - statistics: "All"
    - methodology: "All"
    - quotes: "All direct quotations"
    - technical_terms: "Field-specific vocabulary"
    - acronyms: "All definitions"

  context_preserve:
    - "robust": "Keep in statistical context"
    - "significant": "Keep with p-values"
    - "framework": "Keep in theory sections"
    - "implications": "Keep in discussion"

# Expected outcomes
expected_changes:
  ai_probability_reduction: "40-60%"
  pattern_reduction: "60-80%"
  text_change_percentage: "15-30%"
  reading_flow_impact: "improved"

# Quality checks
quality_checks:
  - name: "Citation Integrity"
    check: "All citations unchanged"
    required: true

  - name: "Statistical Accuracy"
    check: "All numbers unchanged"
    required: true

  - name: "Meaning Preservation"
    check: "Core claims unchanged"
    required: true

  - name: "Tone Consistency"
    check: "Academic tone maintained"
    required: true

  - name: "Flow Improvement"
    check: "Text reads more naturally"
    desired: true

# When to recommend this mode
recommended_for:
  - "Most academic writing"
  - "Conference papers"
  - "Working papers"
  - "Technical reports"
  - "AI probability 40-70%"
  - "When natural flow is important"

default_mode: true  # This is the recommended default
