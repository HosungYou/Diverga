# Structural Transformation Reference (v2.0)
# Layer 3: Paragraph/Section level transformation
# Applied in Balanced and Aggressive modes

version: "2.0.0"
layer: "structural"
description: |
  Deep structural transformation operating at paragraph and section level.
  Addresses patterns that survive vocabulary substitution (Layer 1) and
  phrase restructuring (Layer 2). Based on Round 3 humanization experience
  where structural changes drove AI scores from ~60% to <30%.
  Reference: https://github.com/HosungYou/humanizer

# ============================================================================
# S7: ENUMERATION DISSOLUTION
# ============================================================================
S7_enumeration_dissolution:
  pattern_id: "S7"
  pattern_name: "Enumeration as Prose"
  weight: 12
  risk_level: "HIGH"

  description: |
    Numbered enumerations embedded in flowing text (not formatted lists) are a
    strong AI fingerprint. They create mechanical rhythm and are structurally
    persistent -- surviving vocabulary substitution and paraphrasing. Dissolving
    them into natural narrative is one of the highest-impact structural changes.

  detection_criteria:
    - "First,... Second,... Third,..." within prose paragraphs
    - "Three main findings:" or "Four key contributions:" framing
    - "two/three/four/five main/key/important [noun]" patterns
    - Ordinal markers (first, second, third, fourth, fifth) used as paragraph/sentence openers
    - Numbered claims followed by sequential evidence blocks

  transformation_strategies:
    dissolve_ordinals:
      description: "Remove ordinal markers entirely; use varied transitional devices"
      devices:
        - "Cause-effect links ('...which in turn...')"
        - "Contrast connectors ('but', 'yet', 'however')"
        - "Concessive transitions ('despite this', 'even so')"
        - "Additive transitions that vary ('additionally' vs 'moreover' vs 'also')"
        - "No connector at all -- just start the next idea"

    merge_short_points:
      description: "Combine enumerated points that are closely related"
      example:
        before: |
          First, students showed higher engagement. Second, students
          demonstrated better retention. Third, students reported
          greater satisfaction.
        after: |
          Students showed higher engagement and better retention, and
          when asked, most said they preferred the new approach.

    narrative_integration:
      description: "Weave enumerated findings into an argument arc"
      example:
        before: |
          This study makes three contributions. First, it extends the
          occupational identity threat framework to AI contexts. Second,
          it introduces partisan identity as a moderator of AI concern.
          Third, it provides the first large-scale evidence linking AI
          awareness to occupational concern.
        after: |
          The occupational identity threat framework, until now confined
          to within-firm dynamics, turns out to travel well to the national
          stage. Partisan identity does not merely add noise -- it reshapes
          the entire gradient. And the link between AI awareness and concern?
          It depends on who is doing the worrying.

  preservation_rules:
    - "PRESERVE enumerated steps in Methods when they describe actual procedural sequence"
    - "PRESERVE numbered items in true formatted lists (tables, appendices, criteria lists)"
    - "PRESERVE step-by-step instructions where order is logically required"
    - "PRESERVE numbered hypotheses in formal hypothesis statements (transform only when reporting results)"

  section_application:
    abstract: "Dissolve 'Three contributions:' framing into natural statement"
    introduction: "Dissolve 'four gaps' or 'three research questions' enumeration"
    methods: "EXEMPT -- procedural sequences may use enumeration"
    results: "Dissolve 'First, H1...' sequential reporting"
    discussion: "Dissolve all enumeration; use thematic grouping instead"
    conclusion: "Dissolve 'three implications' or 'four directions' lists"

# ============================================================================
# S8: PARAGRAPH OPENER VARIATION
# ============================================================================
S8_paragraph_opener_variation:
  pattern_id: "S8"
  pattern_name: "Repetitive Paragraph Openers"
  weight: 10
  risk_level: "MEDIUM"

  description: |
    When multiple consecutive paragraphs begin with the same syntactic pattern
    (e.g., "The results..." / "The analysis..." / "The findings..."), the text
    acquires a mechanical rhythm characteristic of AI generation. Human writers
    naturally vary their paragraph openings.

  detection_criteria:
    - ">2 consecutive paragraphs starting with 'The [noun]...'"
    - ">2 consecutive paragraphs starting with 'This [noun]...'"
    - ">2 consecutive paragraphs starting with same determiner + noun pattern"
    - "Paragraph opener diversity ratio < 0.50 (unique first 3 words / total paragraphs)"
    - "Any section where >50% of paragraphs share the same opening structure"

  transformation_strategies:
    question_opener:
      description: "Start paragraph with a question"
      examples:
        - "What explains the partisan gap? Not demographics alone."
        - "But does awareness always lead to concern?"
        - "Why would education matter here?"

    short_declarative_opener:
      description: "Start with a punchy 2-7 word statement"
      examples:
        - "The pattern held."
        - "Age told a different story."
        - "Not all predictors behaved as expected."

    dependent_clause_opener:
      description: "Start with a subordinate clause"
      examples:
        - "Although education predicted concern overall, the effect..."
        - "When we decomposed the partisan gap, something unexpected emerged."
        - "Despite controlling for demographics, partisan identity..."

    concrete_opener:
      description: "Start with a specific number, example, or scenario"
      examples:
        - "Fourteen percentage points separate Republicans from Democrats."
        - "Consider a manufacturing worker in Ohio who has never heard of ChatGPT."
        - "At every income level, the partisan gap persisted."

    contrast_opener:
      description: "Start with a concession or contrast"
      examples:
        - "Yet education's role proved more nuanced than a simple gradient."
        - "Surprisingly, age alone did nothing."
        - "Contrary to our expectations, income showed no independent effect."

  preservation_rules:
    - "Do not force variation where parallel structure serves a rhetorical purpose"
    - "Methods section may tolerate more uniform openers (procedural description)"
    - "Tables and figure captions are exempt"

  section_application:
    abstract: "Limited variation due to word constraints; ensure first 2-3 sentences vary"
    introduction: "Vary openers across all paragraphs"
    methods: "Moderate variation; some uniformity acceptable for procedures"
    results: "Strong variation needed; this section is most prone to 'The [X]...' repetition"
    discussion: "Maximum variation required"
    conclusion: "Vary opening from Discussion opener"

# ============================================================================
# S9: DISCUSSION ARCHITECTURE
# ============================================================================
S9_discussion_architecture:
  pattern_id: "S9"
  pattern_name: "Formulaic Section Structure"
  weight: 8
  risk_level: "MEDIUM"

  description: |
    AI-generated Discussion sections follow a predictable template: restate findings
    → compare to literature → state implications → acknowledge limitations → suggest
    future research. Human-written discussions are more varied, often opening with
    hooks, weaving limitations into the argument, and building toward a conclusion
    rather than mechanically checking boxes.

  detection_criteria:
    - "Discussion opens with 'The present study examined...'"
    - "Discussion opens with 'This study investigated...'"
    - "Discussion opens with 'The purpose of this study was...'"
    - "Predictable sequence: restate → compare → implications → limitations → future"
    - "Limitations in isolated paragraph starting with 'Several limitations...'"
    - "Future directions in final paragraph starting with 'Future research should...'"
    - "Conclusion opens with 'In conclusion, this study...'"

  transformation_strategies:
    hook_opening:
      description: "Open Discussion with a compelling hook"
      examples:
        - question: |
            Why do Democrats and Republicans -- who agree on almost nothing --
            both worry about AI at nearly identical rates?
        - surprising_finding: |
            The strongest predictor of AI concern was not education, income, or
            age. It was whether someone identified as Republican.
        - real_world_scenario: |
            When a radiologist in Houston learns that an AI can read chest X-rays
            faster than she can, her reaction depends less on her training than
            on her politics.
        - tension: |
            Our results reveal a paradox: the Americans most aware of AI are
            not always the most concerned about it.

    embedded_limitations:
      description: "Weave limitations into the argument rather than isolating them"
      example:
        before: |
          Several limitations warrant acknowledgment. First, the cross-sectional
          design limits causal inference. Second, the sample may not generalize
          to non-US contexts. Third, self-reported awareness may differ from
          actual knowledge.
        after: |
          The cross-sectional design means we cannot say whether partisan
          identity causes concern or merely correlates with it -- a longitudinal
          follow-up would settle the question. And because our sample is
          exclusively American, the partisan gradient we found may not travel
          to multiparty systems where AI policy cuts across different coalitions.

    woven_future_directions:
      description: "Embed future directions within the discussion rather than listing at end"
      example:
        before: |
          Future research should examine longitudinal effects. Additionally,
          cross-cultural studies are needed. Finally, qualitative approaches
          could provide deeper understanding.
        after: |
          Whether this partisan gradient persists as AI becomes more visible
          in daily life is an open question -- one that demands panel data
          tracking the same respondents over time. The American two-party
          framing also raises a question: does the same dynamic appear in
          Germany's multiparty system, or Japan's?

  preservation_rules:
    - "PRESERVE IMRAD structure in Abstract (required by most journals)"
    - "PRESERVE logical flow of argument (do not scramble the reasoning)"
    - "PRESERVE all citations and references to specific findings"
    - "PRESERVE the substance of limitations (rephrase, do not remove)"

  section_application:
    abstract: "EXEMPT -- IMRAD structure required by journals"
    introduction: "May restructure; avoid formulaic 'gap → purpose → contribution' if rigid"
    methods: "EXEMPT -- procedural structure is appropriate"
    results: "Light touch; avoid formulaic 'Table X shows...' repetition"
    discussion: "PRIMARY TARGET -- maximum restructuring here"
    conclusion: "Restructure away from 'In conclusion, this study...' formula"

# ============================================================================
# S10: HYPOTHESIS NARRATIVE
# ============================================================================
S10_hypothesis_narrative:
  pattern_id: "S10"
  pattern_name: "Hypothesis Checklist Pattern"
  weight: 10
  risk_level: "HIGH"

  description: |
    Sequential reporting of hypothesis outcomes ("H1 was supported. H2 was partially
    supported. H3 was not supported.") creates a mechanical checklist pattern that is
    a strong AI fingerprint. Human researchers typically organize findings thematically,
    lead with surprising results, and use concrete effect sizes as narrative anchors.

  detection_criteria:
    - "H1 was supported. H2 was partially supported."
    - "Hypothesis 1 was confirmed (p < .05). Hypothesis 2..."
    - "Sequential listing of numbered hypothesis outcomes"
    - "Mechanical 'supported/not supported' language"
    - "Results section organized by hypothesis number rather than theme"

  transformation_strategies:
    thematic_grouping:
      description: "Group related hypotheses by theme rather than number"
      example:
        before: |
          H1 (partisan identity → concern) was supported (p < .001).
          H2 (education → concern) was supported (p = .012).
          H3 (age → concern) was not supported (p = .34).
          H4 (awareness × age → concern) was supported (p = .003).
        after: |
          The political variables dominated. Partisan identity predicted
          concern more strongly than any other factor (AME = 0.14, p < .001),
          while education added a modest but reliable gradient (AME = 0.04,
          p = .012). The demographic story was more complicated: age alone
          did nothing (p = .34), but when paired with AI awareness, it
          reshaped the entire picture (interaction p = .003).

    lead_with_surprise:
      description: "Open with the most interesting or unexpected finding"
      example:
        before: "H1 was supported. H2 was supported. H3 was not supported."
        after: |
          The real surprise was H3. Age -- which most prior research treats
          as a reliable predictor -- had no independent effect at all.

    effect_size_anchoring:
      description: "Use concrete effect sizes as the narrative backbone"
      example:
        before: "H1 was supported (p < .001)."
        after: |
          Republicans were 14 percentage points more likely to express
          concern (AME = 0.14, p < .001) -- a gap roughly equivalent
          to the difference between college graduates and non-graduates.

    non_finding_as_discovery:
      description: "Frame null results as discoveries rather than failures"
      example:
        before: "H3 was not supported (p = .34)."
        after: |
          Age, contrary to our expectations, did nothing on its own.
          That null finding is itself informative: it suggests that
          generational differences in AI concern may be entirely
          mediated by awareness rather than reflecting a cohort effect.

  preservation_rules:
    - "PRESERVE all test statistics verbatim (p-values, effect sizes, CIs)"
    - "PRESERVE all hypothesis numbering in tables (H1, H2, H3 labels OK in tables)"
    - "PRESERVE the actual outcome (supported/not supported) -- just express differently"
    - "PRESERVE the direction and magnitude of all effects"
    - "When reporting >5 hypotheses, some tabular structure may be retained for clarity"

  section_application:
    abstract: "Convert any 'H1 supported, H2 not supported' to brief narrative"
    results: "PRIMARY TARGET -- thematic grouping replaces sequential reporting"
    discussion: "Convert all H-label references to substantive descriptions"
    conclusion: "Summarize findings thematically, never by hypothesis number"

# ============================================================================
# MODE-SPECIFIC APPLICATION
# ============================================================================
mode_application:
  conservative:
    S7: "Not applied (enumeration preserved)"
    S8: "Not applied (openers preserved)"
    S9: "Not applied (structure preserved)"
    S10: "Not applied (hypothesis format preserved)"

  balanced:
    S7: "Dissolve First/Second/Third in Discussion and Conclusion; preserve in Methods"
    S8: "Fix sequences of >2 consecutive same-pattern openers"
    S9: "Rewrite Discussion opener; allow some formulaic structure elsewhere"
    S10: "Convert hypothesis checklists to narrative; keep H-labels in tables"

  aggressive:
    S7: "Dissolve ALL enumeration including 'N main X' framing; Methods exempt"
    S8: "ZERO consecutive paragraphs with similar openers allowed"
    S9: "Break ALL formulaic section structures across entire document"
    S10: "Convert ALL hypothesis references to narrative; eliminate H-labels from prose"

# ============================================================================
# INTERACTION WITH OTHER LAYERS
# ============================================================================
layer_interaction:
  apply_order: "Layer 1 (vocabulary) → Layer 2 (phrase) → Layer 3 (structural)"
  rationale: |
    Structural transformation should be applied AFTER vocabulary and phrase changes
    because: (1) vocabulary changes may resolve some structural issues, (2) structural
    rewriting may reintroduce AI vocabulary if done first, (3) the structural layer
    can optimize sentence length variation after all word-level changes are settled.

  post_structural_check:
    - "Verify no new L1 vocabulary introduced during structural rewriting"
    - "Verify burstiness CV improved (not degraded)"
    - "Verify all citations and statistics preserved through restructuring"
    - "Verify paragraph opener diversity ratio improved"
